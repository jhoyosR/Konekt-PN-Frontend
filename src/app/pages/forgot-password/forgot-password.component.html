<div class="forgot-password-page">
  <div class="forgot-password-container">
    <div class="logo-container">
      <img
        src="images/logo.png"
        alt="Logo Konekt"
        class="forgot-password-logo"
      />
    </div>

    <h2 class="forgot-password-title">Recuperar contraseña</h2>

    <form class="forgot-password-form" (ngSubmit)="sendRecovery()">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          placeholder="correo@ejemplo.com"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <button type="submit" class="btn-send">Enviar enlace</button>

      <button type="button" class="btn-back" (click)="goToLogin()">
        Volver al inicio de sesión
      </button>
    </form>
  </div>
</div>
