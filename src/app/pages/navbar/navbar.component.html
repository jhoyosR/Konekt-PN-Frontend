<nav class="navbar">
  <div class="navbar-left">
    <img src="/images/logo.png" class="logo-img" alt="logo" />
  </div>

  <div class="navbar-center">
    <a
      *ngFor="let link of links"
      [routerLink]="link.path"
      routerLinkActive="active"
      class="nav-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ link.label }}
    </a>
  </div>

  <div class="navbar-right">
    <!-- NOTIFICACIONES -->
    <div class="notification-menu">
      <button class="notification-btn" (click)="toggleNotifications()">
        <i class="fa-solid fa-bell"></i>

        <span
          *ngIf="unreadCount > 0"
          class="notification-badge"
        >
          {{ unreadCount }}
        </span>
      </button>

      <div class="dropdown-menu notifications" *ngIf="notificationsOpen">
        <div class="notifications-header">
          <span>Notificaciones</span>

          <button
            class="mark-all-btn"
            (click)="markAllNotificationsAsRead()"
          >
            Marcar todas como leídas
          </button>
        </div>

        <div
          *ngIf="notifications.length === 0"
          class="empty-notifications"
        >
          <i class="fa-solid fa-bell-slash"></i>
          <span>Sin notificaciones</span>
        </div>

        <div
          *ngFor="let notification of notifications"
          class="notification-item"
        >
          <div class="notification-content">
            <h5>{{ notification.title }}</h5>

            <p>{{ notification.message }}</p>

            <small>
              {{
                notification.createdAt
                  | date : "mediumDate" : "UTC" : "es-CO"
              }}
              {{
                notification.createdAt
                  | date : "shortTime" : "UTC" : "es-CO"
              }}
            </small>
          </div>

          <div class="notification-actions">
            <input
              *ngIf="!notification.isRead"
              type="checkbox"
              title="Marcar como leída"
              (change)="markNotificationAsRead(notification.id)"
            />

            <i
              *ngIf="notification.isRead"
              class="fa-solid fa-check"
            ></i>
          </div>
        </div>
      </div>
    </div>

    <!-- PERFIL -->
    <div class="user-menu">
      <button class="user-btn" (click)="toggleMenu()">
        <ng-container *ngIf="profilePhotoUrl; else defaultIcon">
          <img class="nav-avatar" [src]="profilePhotoUrl" alt="profile" />
        </ng-container>

        <ng-template #defaultIcon>
          <i class="fa-solid fa-user-circle"></i>
        </ng-template>

        <i class="fa-solid fa-chevron-down"></i>
      </button>

      <div class="dropdown-menu" *ngIf="menuOpen">
        <button class="dropdown-item" (click)="goToProfile()">
          <i class="fa-solid fa-user"></i>
          Mi perfil
        </button>

        <button class="dropdown-item logout" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket"></i>
          Cerrar sesión
        </button>
      </div>
    </div>
  </div>
</nav>
