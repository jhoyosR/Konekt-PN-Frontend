<app-navbar [role]="'university'"></app-navbar>

<div class="students-page">
  <div class="list-container">
    <h2 class="page-title">Estudiantes de la universidad</h2>

    <div *ngIf="students.length === 0" class="empty">
      No hay estudiantes registrados
    </div>

    <div class="cards-grid">
      <div *ngFor="let student of students" class="card">
        <div class="student-header">
          <!-- AVATAR -->
          <div class="student-avatar">
            <img
              *ngIf="student.profilePhotoUrl; else noPhoto"
              [src]="student.profilePhotoUrl"
              alt="student photo"
            />

            <ng-template #noPhoto>
              <div class="avatar-placeholder">
                <i class="fa-solid fa-user"></i>
              </div>
            </ng-template>
          </div>

          <!-- INFO -->
          <div class="student-info">
            <h3>{{ student.fullName }}</h3>
          </div>

          <!-- BOTÓN VER FOTO -->
          <button
            class="view-photo-btn"
            *ngIf="student.profilePhotoUrl"
            (click)="openStudentPhoto(student.profilePhotoUrl)"
            title="Ver foto"
          >
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>

        <p class="about">
          {{ student.about }}
        </p>

        <div class="info-grid">
          <div>
            <i class="fa-solid fa-envelope"></i>
            <b>Correo:</b>
            {{ student.user.email }}
          </div>

          <div>
            <i class="fa-solid fa-id-card"></i>
            <b>Documento:</b>
            {{ student.documentNumber }}
          </div>

          <div>
            <i class="fa-solid fa-graduation-cap"></i>
            <b>Carrera:</b>
            {{ student.career }}
          </div>

          <div>
            <i class="fa-solid fa-book-open"></i>
            <b>Semestre:</b>
            {{ student.semester }}
          </div>

          <div>
            <i class="fa-solid fa-phone"></i>
            <b>Teléfono:</b>
            {{ student.phone }}
          </div>
        </div>
        <button class="manage-btn" (click)="managePractice(student.id)">
          <i class="fa-solid fa-briefcase"></i>
          Gestionar práctica
        </button>
      </div>
    </div>

    <div class="pagination-container" *ngIf="pageCount > 1">
      <button
        class="pagination-btn"
        (click)="previousPage()"
        [disabled]="!hasPrev"
      >
        <i class="fa-solid fa-chevron-left"></i>
        Anterior
      </button>

      <select
        class="pagination-select"
        [value]="page"
        (change)="goToPage(+$any($event.target).value)"
      >
        <option *ngFor="let p of pages" [value]="p">
          Página {{ p }} de {{ pageCount }}
        </option>
      </select>

      <button class="pagination-btn" (click)="nextPage()" [disabled]="!hasNext">
        Siguiente
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>
