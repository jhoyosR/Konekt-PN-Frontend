<div class="reset-password-page">
  <div class="reset-password-container">

    <div class="logo-container">
      <img src="images/logo.png" alt="Logo Konekt" class="reset-password-logo" />
    </div>

    <h2 class="reset-password-title">Restablecer contraseña</h2>

    <form class="reset-password-form" (ngSubmit)="resetPassword()">

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" [value]="email" disabled />
      </div>

      <div class="form-group">
        <label>Nueva contraseña</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="********"
          required
        />
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="********"
          required
        />
      </div>

      <div class="show-password">
        <input
          type="checkbox"
          [(ngModel)]="showPassword"
          name="showPassword"
        />
        <label>Mostrar contraseñas</label>
      </div>

      <button type="submit" class="btn-reset">
        Guardar contraseña
      </button>

      <button type="button" class="btn-back" (click)="goToLogin()">
        Volver al inicio de sesión
      </button>

    </form>

  </div>
</div>
