<div class="reset-password-page">
  <div class="reset-password-container">
    <div class="logo-container">
      <img
        src="images/logo.png"
        alt="Logo Konekt"
        class="reset-password-logo"
      />
    </div>

    <h2 class="reset-password-title">Restablecer contraseña</h2>

    <form
      class="reset-password-form"
      [formGroup]="passwordForm"
      (ngSubmit)="resetPassword()"
    >
      <!-- PASSWORD -->
      <div class="form-group">
        <label>Nueva contraseña</label>

        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
        />

        <small
          class="error"
          *ngIf="password?.touched && password?.invalid"
        >
          La contraseña debe tener mínimo 8 caracteres, una letra mayúscula,
          una letra minúscula, un número y un carácter especial.
        </small>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Confirmar contraseña</label>

        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="confirmPassword"
        />

        <small
          class="error"
          *ngIf="passwordsDoNotMatch"
        >
          Las contraseñas no coinciden.
        </small>
      </div>

      <!-- SHOW PASSWORD -->
      <div class="show-password">
        <input
          type="checkbox"
          [(ngModel)]="showPassword"
          [ngModelOptions]="{ standalone: true }"
        />
        <label>Mostrar contraseñas</label>
      </div>

      <!-- SUBMIT -->
      <button
        type="submit"
        class="btn-reset"
        [disabled]="passwordForm.invalid"
      >
        Guardar contraseña
      </button>

      <!-- BACK -->
      <button
        type="button"
        class="btn-back"
        (click)="goToLogin()"
      >
        Volver al inicio de sesión
      </button>
    </form>
  </div>
</div>
